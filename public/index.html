<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>VerseLab - AI Song Generator</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      width: 90%;
      max-width: 520px;
      background: #111827;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    h1 {
      text-align: center;
      margin-bottom: 5px;
    }

    p {
      text-align: center;
      font-size: 14px;
      color: #9ca3af;
      margin-bottom: 20px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 10px;
      border: none;
      outline: none;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #6366f1;
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #4f46e5;
    }

    pre {
      background: #0b1220;
      padding: 15px;
      border-radius: 12px;
      margin-top: 15px;
      white-space: pre-wrap;
      max-height: 320px;
      overflow-y: auto;
    }

    .loader {
      display: none;
      text-align: center;
      margin-top: 10px;
      color: #93c5fd;
    }
  </style>
</head>

<body>

<div class="card">

  <h1>🎵 VerseLab</h1>
  <p>AI Song & Lyrics Generator</p>

  <input id="prompt" placeholder="Describe your song idea">

  <select id="style">
    <option value="pop">Pop</option>
    <option value="rap">Rap</option>
    <option value="sad">Sad</option>
    <option value="drill">Drill</option>
    <option value="love">Love</option>
  </select>

  <select id="length">
    <option value="short">Short</option>
    <option value="normal" selected>Normal</option>
    <option value="long">Long</option>
  </select>

  <button onclick="generate()">Create Verse</button>

  <div class="loader" id="loader">🎧 VerseLab is crafting your song...</div>

  <pre id="output"></pre>

</div>

<script>
async function generate() {
  const prompt = document.getElementById("prompt").value;
  const style = document.getElementById("style").value;
  const length = document.getElementById("length").value;

  const output = document.getElementById("output");
  const loader = document.getElementById("loader");

  output.textContent = "";
  loader.style.display = "block";

  const res = await fetch("/api/generate", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ prompt, style, length })
  });

  const data = await res.json();

  loader.style.display = "none";
  output.textContent = data.text || "Error generating song.";
}
</script>

</body>
</html>
